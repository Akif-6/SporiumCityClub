<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Sporium City Club</title>
    <link rel="icon" type="image/png" href="resim/s.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
    /* --- ZEHİR YEŞİLİ TEMA --- */
    :root { 
        --primary: #00e640; --primary-dark: #00b332;
        --dark: #111; --darker: #0a0a0a; --light: #fff; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Poppins', sans-serif; background-color: var(--darker); color: var(--light); 
        display: flex; align-items: center; justify-content: center; min-height: 100vh; 
        background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop'); 
        background-size: cover; background-position: center; 
    }
    .login-container { background: rgba(10, 10, 10, 0.95); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; box-shadow: 0 0 40px rgba(0, 230, 64, 0.15); }
    .logo-area { text-align: center; margin-bottom: 30px; }
    .logo-area h2 { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .logo-area span { color: var(--primary); text-shadow: 0 0 10px rgba(0, 230, 64, 0.5); }
    
    .login-tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #222; }
    .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #666; font-weight: 600; transition: 0.3s; }
    .tab:hover { color: #fff; }
    .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; text-shadow: 0 0 8px rgba(0, 230, 64, 0.4); }

    .form-content { display: none; }
    .form-content.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
    .form-group input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; transition: 0.3s; }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 230, 64, 0.2); }

    .btn-login { width: 100%; padding: 12px; background: linear-gradient(45deg, #00e640, #00992b); border: none; color: #000; font-weight: 800; border-radius: 5px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(0, 230, 64, 0.3); text-transform: uppercase; letter-spacing: 1px; }
    .btn-login:hover { background: var(--primary-dark); box-shadow: 0 0 25px rgba(0, 230, 64, 0.6); transform: translateY(-2px); }
    .back-home { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
    .back-home a { transition: 0.3s; text-decoration: none; color: inherit; }
    .back-home a:hover { color: var(--primary); text-shadow: 0 0 5px var(--primary); }
    /* Tablet ve Telefonlar için (768px ve altı) */
@media (max-width: 768px) {
    /* 1. Sidebar'ı (Yan Menü) Üste veya Alta Al */
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        flex-direction: row; /* Yan yana diz */
        justify-content: space-around;
    }

    /* 2. Ana İçerik Alanını Genişlet */
    .main-content {
        margin-left: 0;
        padding: 15px;
    }

    /* 3. Kartları Alt Alta Diz (Grid/Flex Ayarı) */
    .card-container {
        grid-template-columns: 1fr; /* Tek sütun yap */
    }
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h2>Sporium<span>City</span></h2>
            <p style="color:#888; font-size:0.9rem;">Giriş Paneli</p>
        </div>

        <div class="login-tabs">
            <div class="tab active" onclick="switchTab('member')">Üye Girişi</div>
            <div class="tab" onclick="switchTab('admin')">Yönetici Girişi</div>
        </div>

        <div id="member-box" class="form-content active">
            <div class="form-group">
                <label>E-posta Adresi</label>
                <input type="email" placeholder="ornek@sporium.com" id="member-email">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" placeholder="******" id="member-pass">
            </div>
            <button onclick="handleLogin('member')" class="btn-login">GİRİŞ YAP</button>
        </div>

        <div id="admin-box" class="form-content">
            <div class="form-group">
                <label>Yönetici E-posta</label>
                <input type="text" placeholder="admin@sporium.com" id="admin-email">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" placeholder="******" id="admin-pass">
            </div>
            <button onclick="handleLogin('admin')" class="btn-login" style="background:linear-gradient(45deg, #333, #111); color:#fff; box-shadow:none; border:1px solid #444;">YÖNETİCİ GİRİŞİ</button>
        </div>

        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Anasayfaya Dön</a>
        </div>
    </div>

<script>
    // --- 1. SEKME GEÇİŞİ ---
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
        
        if (type === 'member') {
            document.getElementById('member-box').classList.add('active');
            document.querySelectorAll('.tab')[0].classList.add('active');
        } else {
            document.getElementById('admin-box').classList.add('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
        }
    }

// --- 2. GİRİŞ İŞLEMİ (BACKEND İLE) ---
    async function handleLogin(type) {
        let email, sifre;

        // Hangi sekmedeysek o inputları alalım
        if (type === 'member') {
            email = document.getElementById('member-email').value;
            sifre = document.getElementById('member-pass').value;
        } else {
            email = document.getElementById('admin-email').value;
            sifre = document.getElementById('admin-pass').value;
        }

        if (!email || !sifre) {
            Swal.fire({
                icon: 'warning',
                title: 'Eksik Bilgi',
                text: 'Lütfen tüm alanları doldurun!',
                background: '#1e1e1e', color: '#fff', confirmButtonColor: '#00e640'
            });
            return;
        }

        // Backend'e İstek Gönderiyoruz
        try {
            // DİKKAT: C# modelindeki özellik isimleri büyük harfle başlıyorsa (Email, Sifre)
            // JSON gönderirken de büyük harfle göndermek garanti çözüm olur.
            // Ancak ASP.NET Core genelde camelCase (küçük harf) kabul eder. 
            // Yine de sorun çıkarsa burayı "Email" ve "Sifre" yapabilirsin.
            const loginData = {
                Email: email,  // Backend'de public string Email { get; set; } ile eşleşir
                Sifre: sifre   // Backend'de public string Sifre { get; set; } ile eşleşir
            };

            const response = await fetch("https://localhost:7028/api/Uyeler/giris", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(loginData)
            });

if (response.ok) {
                const data = await response.json();

                // 1. Token ve Kullanıcıyı Kaydet
                if (data.token) {
                    localStorage.setItem("token", data.token);
                }
                
                // Kullanıcı verisini al (data.user içinde geliyor)
                const userData = data.user;
                localStorage.setItem("kullanici", JSON.stringify(userData));

                // Rolü belirle
                const userRole = userData.rol || userData.Rol || "uye";

                // 2. Animasyon Göster
                const Toast = Swal.mixin({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 1500,
                    timerProgressBar: true, background: '#1e1e1e', color: '#fff'
                });

                Toast.fire({ icon: 'success', title: 'Giriş Başarılı! Yönlendiriliyorsunuz...' });

                // 3. Yönlendirme (SetTimeout BURADA KAPANIYOR)
                // --- 3. Yönlendirme (Bu kısmı senin kodunla değiştir) ---
setTimeout(() => {
    // Rolü alalım, her ihtimale karşı küçük harfe çevirelim ve boşlukları silelim
    // Veritabanından "Admin" gelirse -> "admin" olur.
    let role = (userData.rol || userData.Rol || "uye").toString().toLowerCase().trim();

    console.log("Sistemin okuduğu rol:", role); // F12 Console'dan bakabilirsin

    if (role === "admin") {
        console.log("Yönetici paneline gidiliyor...");
        window.location.href = "admin_panel.html"; // Admin sayfası
    } else {
        console.log("Üye profiline gidiliyor...");
        window.location.href = "profil.html"; // Normal üye sayfası
    }
}, 1500);
            } else {
                // Hata Durumu
                let errorMsg = 'E-posta veya Şifre Yanlış!';
                try {
                    const errorData = await response.json();
                    if(errorData.message) errorMsg = errorData.message;
                } catch(e) {}

                Swal.fire({
                    icon: 'error', title: 'Giriş Başarısız', text: errorMsg,
                    background: '#1e1e1e', color: '#fff', confirmButtonColor: '#d33'
                });
            }
        } catch (error) {
            console.error(error);
            Swal.fire({
                icon: 'error', title: 'Sunucu Hatası', text: 'Backend bağlantısı kurulamadı! (API çalışıyor mu?)',
                background: '#1e1e1e', color: '#fff', confirmButtonColor: '#d33'
            });
        }
    }
    // Sayfa tamamen yüklendiğinde çalış
document.addEventListener('DOMContentLoaded', () => {

    // 1. Giriş butonunu bul (Senin butonun class'ı btn-login ise öyle yaz, değilse ID'sini yaz)
    const loginBtn = document.querySelector('.btn-login') || document.getElementById('loginBtn');

    // 2. Sayfadaki tüm inputları (Email ve Şifre) dinle
    const inputs = document.querySelectorAll('input');

    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Sayfanın yenilenmesini engelle
                
                if (loginBtn) {
                    loginBtn.click(); // Sanki butona elle basılmış gibi tetikle
                } else {
                    console.error("Giriş butonu bulunamadı! Lütfen class veya ID kontrol et.");
                }
            }
        });
    });
});
// --- ENTER TUŞU DİNLEYİCİSİ ---
document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        // Tarayıcıya varsayılan işlemi (sayfa yenileme vb.) engelle diyoruz
        e.preventDefault();

        // Admin şifre kutusunu kontrol edelim. 
        // Eğer bu kutu şu an ekranda görünürse admin girişidir, değilse üye girişidir.
        const adminPassInput = document.getElementById('admin-pass');
        
        // offsetParent null değilse o element şu an ekranda görünüyordur
        const type = (adminPassInput && adminPassInput.offsetParent !== null) ? 'admin' : 'member';

        // Senin orijinal fonksiyonunu doğru parametreyle çağırıyoruz
        handleLogin(type);
    }
});
</script>
</body>
</html>
